<!DOCTYPE html>
<html lang="en" data-theme="dark" data-contrast="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LDS E-Learning Platform Portal Dashboard. Manage your studies, build courses, or validate submissions.">
  <title>LDS E-Learning Platform | Console Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header class="global-header"></header>

    <!-- Context-Aware Dashboard Layout -->
    <main class="dashboard-layout">
      <!-- Sidebar containing dynamic buttons -->
      <aside class="sidebar" id="dashboard-sidebar">
        <!-- Injected dynamically based on role -->
      </aside>

      <!-- Main panel content -->
      <section class="dashboard-content" id="dashboard-main-content">
        <!-- Injected dynamically by js/dashboard.js -->
      </section>
    </main>

    <footer class="global-footer"></footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    // Route guard: redirect to login if session does not exist
    document.addEventListener("DOMContentLoaded", () => {
      const user = Session.getCurrentUser();
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      // Initialize the dashboard layout
      Dashboard.init();
    });
  </script>
</body>
</html>
