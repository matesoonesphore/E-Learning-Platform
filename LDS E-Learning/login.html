<!DOCTYPE html>
<html lang="en" data-theme="dark" data-contrast="normal">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Access the LDS E-Learning portal. Sign in to view your courses, analytics, and timed quizzes.">
  <title>LDS E-Learning Platform | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header class="global-header"></header>

    <main class="auth-container">
      <div class="card auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to resume your learning path.</p>
        </div>

        <form id="login-form" onsubmit="handleLoginSubmit(event)">
          <div class="form-group">
            <label for="email-input">Email Address</label>
            <input type="email" id="email-input" class="form-input" placeholder="e.g. student@edusphere.com" required>
          </div>
          <div class="form-group">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" class="form-input" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
          <span style="color: var(--text-muted);">Don't have an account? </span>
          <a href="register.html" style="color: var(--color-primary); font-weight: 600;">Register Now</a>
        </div>

        <!-- Testing Shortcuts -->
        <div class="quick-logins">
          <button class="btn btn-secondary btn-xs" onclick="quickLogin('student@edusphere.com')">Student</button>
          <button class="btn btn-secondary btn-xs" onclick="quickLogin('instructor@edusphere.com')">Instructor</button>
          <button class="btn btn-secondary btn-xs" onclick="quickLogin('admin@edusphere.com')">Admin</button>
        </div>
        <div style="text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">
          (Quick Logins: Password is <strong>password123</strong>)
        </div>
      </div>
    </main>

    <footer class="global-footer"></footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Route guard: if already logged in, redirect to dashboard
    document.addEventListener("DOMContentLoaded", () => {
      if (Session.getCurrentUser()) {
        window.location.href = "dashboard.html";
      }
    });

    function handleLoginSubmit(e) {
      e.preventDefault();
      const email = document.getElementById("email-input").value;
      const pass = document.getElementById("password-input").value;
      Auth.login(email, pass);
    }

    function quickLogin(email) {
      document.getElementById("email-input").value = email;
      document.getElementById("password-input").value = "password123";
      Auth.login(email, "password123");
    }
  </script>
</body>

</html>
