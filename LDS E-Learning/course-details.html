<!DOCTYPE html>
<html lang="en" data-theme="dark" data-contrast="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View course syllabus, instructor bio, student reviews, or watch course videos in the LDS E-Learning Platform learning player.">
  <title>LDS E-Learning Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .captions-overlay {
      position: absolute;
      bottom: 10%;
      left: 10%;
      right: 10%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      text-align: center;
      padding: 0.5rem;
      font-size: 1rem;
      border-radius: 4px;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="global-header no-print"></header>

    <!-- Main Workspace Container -->
    <main id="portal-main-content">
      <!-- Injected by Page Router Controller -->
    </main>

    <footer class="global-footer no-print"></footer>
  </div>

  <!-- Javascript Modules -->
  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/certificates.js"></script>
  <script>
    let activeCourseId = null;
    let activeLesson = null;
    let captionInterval = null;

    // Captions Data Pool
    const LECTURE_CAPTIONS = [
      { start: 0, end: 4, text: "Welcome to LDS E-Learning Platform! In this lecture, we introduce key terms." },
      { start: 5, end: 10, text: "Understanding computer architecture and structures is vital for scaling." },
      { start: 11, end: 15, text: "Make sure you have downloaded the cheatsheet before writing code." },
      { start: 16, end: 22, text: "Let's dive into practical application variables and DOM rules now!" }
    ];

    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const courseId = params.get("id");
      const showCert = params.get("cert");

      if (!courseId) {
        window.location.href = "courses.html";
        return;
      }

      activeCourseId = courseId;

      if (showCert === "true") {
        // Render Certificate
        const container = document.getElementById("portal-main-content");
        container.className = "container";
        container.innerHTML = `<div id="certificate-preview-container"></div>`;
        Certificates.render(courseId);
        return;
      }

      routeCoursePage();
    });

    function routeCoursePage() {
      const user = Session.getCurrentUser();
      const progress = window.DB.get("progress").find(p => p.userId === user?.id && p.courseId === activeCourseId);
      
      const container = document.getElementById("portal-main-content");

      if (!progress) {
        // Case A: Show Detail/Purchase Page
        renderPurchasePage(container);
      } else {
        // Case B: Show Classroom Player
        container.className = ""; // Remove container paddings for sidebar layout
        renderClassroom(container, progress);
      }
    }

    /* ================= CASE A: PURCHASE / DETAILS VIEW ================= */
    function renderPurchasePage(container) {
      container.className = "container";
      const course = window.DB.get("courses").find(c => c.id === activeCourseId);
      const lessons = window.DB.get("lessons").filter(l => l.courseId === activeCourseId);
      const reviews = window.DB.get("reviews").filter(r => r.courseId === activeCourseId);

      if (!course) {
        container.innerHTML = "<h3>Course not found.</h3>";
        return;
      }

      const reviewsHtml = reviews.length === 0 ? "<p>No reviews yet.</p>" : reviews.map(r => `
        <div class="thread-post">
          <div class="thread-post-author">⭐ ${r.rating} - ${r.userName}</div>
          <div class="thread-post-text">${r.comment}</div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="grid-2">
          <div>
            <h2 style="font-size:2.5rem; margin-bottom:1rem;">${course.title}</h2>
            <p style="color:var(--text-muted); margin-bottom:1.5rem;">${course.description}</p>
            
            <div style="display:flex; gap:1.5rem; margin-bottom:2rem; font-size:0.9rem;">
              <span>📶 Level: <strong>${course.level}</strong></span>
              <span>🗣️ Language: <strong>${course.language.toUpperCase()}</strong></span>
              <span>⭐ rating: <strong>${course.rating} / 5</strong></span>
            </div>

            <div class="card" style="margin-bottom:2rem;">
              <h3>Syllabus Details</h3>
              <div style="margin-top:1rem; display:flex; flex-direction:column; gap:0.75rem;">
                ${lessons.map((l, i) => `
                  <div style="display:flex; justify-content:space-between; font-size:0.9rem; padding:0.5rem; border-bottom:1px solid var(--border-color);">
                    <span>Lecture ${i+1}: ${l.title}</span>
                    <span style="color:var(--text-muted);">${l.duration} min</span>
                  </div>
                `).join('') || "<p>Lectures pending upload.</p>"}
              </div>
            </div>
          </div>

          <div style="display:flex; flex-direction:column; gap:2rem;">
            <div class="card" style="text-align:center;">
              <div class="course-thumb" style="margin-bottom:1.5rem;">
                ${Courses.getSvgThumbnail(course.category)}
              </div>
              <div style="font-size:2.5rem; font-weight:800; color:var(--color-secondary); margin-bottom:1rem;">
                $${course.price}
              </div>
              <button class="btn btn-primary" style="width:100%; margin-bottom:1rem;" onclick="Courses.handleEnrollmentClick('${course.id}')">Buy Course & Enroll</button>
              <p style="font-size:0.8rem; color:var(--text-muted);">Includes verifiable completion certificate and timed exam.</p>
            </div>

            <div class="card">
              <h3>Student Testimonials</h3>
              <div style="margin-top:1rem;">
                ${reviewsHtml}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    /* ================= CASE B: CLASSROOM PLAYER VIEW ================= */
    function renderClassroom(container, progress) {
      const course = window.DB.get("courses").find(c => c.id === activeCourseId);
      const lessons = window.DB.get("lessons").filter(l => l.courseId === activeCourseId).sort((a,b) => a.order - b.order);

      if (lessons.length === 0) {
        container.className = "container";
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:4rem;">
            <h3>Lectures Loading</h3>
            <p style="color:var(--text-muted);">This course has no published lectures yet. Check back soon!</p>
          </div>
        `;
        return;
      }

      // Initial active lesson is either first, or last incomplete, or user clicked
      activeLesson = lessons[0];

      container.innerHTML = `
        <div class="classroom-layout">
          <!-- Left side: Player -->
          <div class="player-pane">
            <h2 id="classroom-lesson-title">${activeLesson.title}</h2>
            
            <div class="video-container">
              <video id="classroom-video" controls ontimeupdate="handleVideoTimeUpdate()" onended="handleVideoEnded()">
                <source src="${activeLesson.videoUrl}" type="video/mp4">
              </video>
              <div class="captions-overlay" id="captions-overlay"></div>
            </div>

            <!-- Video Controller Panel -->
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--bg-surface); padding:1rem; border-radius:var(--radius-sm); border:1px solid var(--border-color); flex-wrap:wrap; gap:1rem;">
              <div style="display:flex; gap:1rem; align-items:center;">
                <label style="font-size:0.85rem; font-weight:700;">Speed:</label>
                <select id="video-speed-select" class="form-input" style="padding:0.25rem 0.5rem;" onchange="setVideoSpeed()">
                  <option value="0.5">0.5x</option>
                  <option value="1" selected>1.0x (Normal)</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2.0x</option>
                </select>
              </div>

              <div style="display:flex; gap:1rem;">
                <button class="btn btn-secondary btn-xs" onclick="toggleCaptions()">Toggle Subtitles</button>
                <button class="btn btn-secondary btn-xs" onclick="bookmarkTimestamp()">Bookmark Timestamp</button>
                <button class="btn btn-accent btn-xs" onclick="markLessonComplete()">Mark Complete & Earn Points</button>
              </div>
            </div>

            <!-- Tabs area: Notes, Discussion, Announcements -->
            <div class="card" style="padding:0;">
              <div class="sidebar-tab-header">
                <button class="tab-btn active" onclick="switchClassroomTab('notes', this)">Notes</button>
                <button class="tab-btn" onclick="switchClassroomTab('forum', this)">Q&A Forum</button>
                <button class="tab-btn" onclick="switchClassroomTab('announcements', this)">Announcements</button>
              </div>
              <div class="tab-content" id="classroom-tab-content">
                <!-- Notes tab is loaded by default -->
              </div>
            </div>
          </div>

          <!-- Right side: Sidebar (Lessons Outline) -->
          <div class="classroom-sidebar">
            <div style="padding:1rem; border-bottom:1px solid var(--border-color); font-weight:800; font-family:var(--font-heading); font-size:1.1rem;">
              📖 Course Syllabus
            </div>
            <div style="flex-grow:1; overflow-y:auto; padding:1rem;" id="classroom-lesson-list">
              <!-- Render lessons -->
            </div>
          </div>
        </div>
      `;

      renderLessonList(progress);
      switchClassroomTab('notes');
      
      // Auto resume mechanism
      loadVideoResumeState();
    }

    function renderLessonList(progress) {
      const lessons = window.DB.get("lessons").filter(l => l.courseId === activeCourseId).sort((a,b) => a.order - b.order);
      const listContainer = document.getElementById("classroom-lesson-list");
      if (!listContainer) return;

      let html = lessons.map((l, i) => {
        const isCompleted = progress.completedLessons.includes(l.id);
        const isActive = l.id === activeLesson.id;
        
        let statusMarker = isCompleted ? "✅" : "⭕";
        let cssClass = isActive ? "active" : "";
        if (isCompleted) cssClass += " completed";

        return `
          <div class="lesson-list-item ${cssClass}" onclick="selectLesson('${l.id}')">
            <span>${statusMarker}</span>
            <div style="font-size:0.9rem;">
              <strong>Lecture ${i+1}: ${l.title}</strong>
              <div style="font-size:0.75rem; color:var(--text-muted);">${l.duration} mins</div>
            </div>
          </div>
        `;
      }).join('');

      // Add timed quiz link at the bottom
      const quizPassed = progress.completedQuizzes.includes(`q_${activeCourseId.substring(2)}`) || progress.completedQuizzes.length > 0;
      let quizMarker = quizPassed ? "✅" : "⏱️";
      let certLink = "";
      if (progress.completed) {
        certLink = `
          <div class="lesson-list-item" style="border: 1px solid var(--color-secondary); color: var(--color-secondary);" onclick="window.location.href='course-details.html?id=${activeCourseId}&cert=true'">
            <span>🎓</span>
            <div style="font-size:0.9rem;">
              <strong>Download Diploma</strong>
              <div style="font-size:0.75rem; font-weight:700;">Verifiable Proof</div>
            </div>
          </div>
        `;
      }

      html += `
        <div class="lesson-list-item" style="border: 1px solid var(--color-primary);" onclick="selectQuiz()">
          <span>${quizMarker}</span>
          <div style="font-size:0.9rem;">
            <strong>Timed Assessment Quiz</strong>
            <div style="font-size:0.75rem; color:var(--text-muted);">Requires 80% to pass</div>
          </div>
        </div>
        ${certLink}
      `;

      listContainer.innerHTML = html;
    }

    function selectLesson(lessonId) {
      const lessons = window.DB.get("lessons").filter(l => l.courseId === activeCourseId);
      const target = lessons.find(l => l.id === lessonId);
      if (!target) return;

      activeLesson = target;
      
      // Update Title & Video Source
      document.getElementById("classroom-lesson-title").textContent = activeLesson.title;
      const video = document.getElementById("classroom-video");
      if (video) {
        video.src = activeLesson.videoUrl;
        video.load();
      }

      // Re-render lesson active class
      const user = Session.getCurrentUser();
      const progress = window.DB.get("progress").find(p => p.userId === user?.id && p.courseId === activeCourseId);
      renderLessonList(progress);
      
      // Load tabs and restore speed to normal
      const speedSelect = document.getElementById("video-speed-select");
      if (speedSelect) speedSelect.value = "1";
      
      loadVideoResumeState();
    }

    function selectQuiz() {
      // Clear video source
      const video = document.getElementById("classroom-video");
      if (video) {
        video.pause();
        video.src = "";
      }

      document.getElementById("classroom-lesson-title").textContent = "Timed Course Assessment";
      const pane = document.getElementById("classroom-tab-content").parentNode;
      pane.innerHTML = `
        <div class="tab-content" id="quiz-pane-content" style="padding: 2rem 1rem;">
          <!-- Loaded by Quiz Module -->
        </div>
      `;

      Quiz.initQuiz(activeCourseId);
    }

    /* ================= CLASSROOM SUB-SYSTEMS (PLAYER CONTROLS) ================= */
    function setVideoSpeed() {
      const select = document.getElementById("video-speed-select");
      const video = document.getElementById("classroom-video");
      if (video && select) {
        video.playbackRate = parseFloat(select.value);
      }
    }

    let captionsActive = false;
    function toggleCaptions() {
      captionsActive = !captionsActive;
      const overlay = document.getElementById("captions-overlay");
      if (overlay) {
        overlay.style.display = captionsActive ? "block" : "none";
      }
      showToast(`Captions ${captionsActive ? "enabled" : "disabled"}`, "info");
    }

    function handleVideoTimeUpdate() {
      const video = document.getElementById("classroom-video");
      if (!video) return;

      const time = video.currentTime;

      // 1. Render Captions
      if (captionsActive) {
        const match = LECTURE_CAPTIONS.find(c => time >= c.start && time <= c.end);
        const overlay = document.getElementById("captions-overlay");
        if (overlay) {
          overlay.textContent = match ? match.text : "";
        }
      }

      // 2. Save Auto Resume State (throttle saving in localstorage to integers)
      const roundedTime = Math.floor(time);
      if (roundedTime % 3 === 0) {
        localStorage.setItem(`edusphere_resume_${activeLesson.id}`, roundedTime);
      }
    }

    function loadVideoResumeState() {
      const savedTime = localStorage.getItem(`edusphere_resume_${activeLesson.id}`);
      if (savedTime) {
        const video = document.getElementById("classroom-video");
        if (video) {
          video.currentTime = parseFloat(savedTime);
          showToast(`Resuming playback at ${Math.floor(savedTime / 60)}m ${Math.floor(savedTime % 60)}s`, "success");
        }
      }
    }

    function handleVideoEnded() {
      // Auto complete lesson
      markLessonComplete();
    }

    function markLessonComplete() {
      const user = Session.getCurrentUser();
      if (!user) return;

      const progressList = window.DB.get("progress");
      const prog = progressList.find(p => p.userId === user.id && p.courseId === activeCourseId);

      if (prog && !prog.completedLessons.includes(activeLesson.id)) {
        prog.completedLessons.push(activeLesson.id);
        window.DB.update("progress", prog.id, { completedLessons: prog.completedLessons });
        
        // Award points
        awardPoints(10, `Completed Lecture: ${activeLesson.title}`);
        
        renderLessonList(prog);
      } else {
        showToast("Lesson completed already.", "info");
      }
    }

    function bookmarkTimestamp() {
      const video = document.getElementById("classroom-video");
      if (!video) return;

      const time = Math.floor(video.currentTime);
      const user = Session.getCurrentUser();
      
      const noteText = prompt("Enter a description for this bookmark:", `Bookmark at ${Math.floor(time / 60)}:${(time % 60).toString().padStart(2, '0')}`);
      if (noteText === null) return; // Cancelled

      const progressList = window.DB.get("progress");
      const prog = progressList.find(p => p.userId === user.id && p.courseId === activeCourseId);

      if (prog) {
        prog.bookmarks.push({
          lessonId: activeLesson.id,
          timestamp: time,
          noteText
        });
        window.DB.update("progress", prog.id, { bookmarks: prog.bookmarks });
        showToast("Bookmark timestamp saved!", "success");
        
        // If notes tab is active, refresh it
        if (activeTabId === "notes") renderNotesTab();
      }
    }

    /* ================= CLASSROOM TABS LOGIC ================= */
    let activeTabId = 'notes';
    function switchClassroomTab(tabId, el) {
      activeTabId = tabId;
      if (el) {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        el.classList.add("active");
      }

      const content = document.getElementById("classroom-tab-content");
      if (!content) return;

      if (tabId === "notes") renderNotesTab(content);
      if (tabId === "forum") renderForumTab(content);
      if (tabId === "announcements") renderAnnouncementsTab(content);
    }

    function renderNotesTab(content) {
      if (!content) content = document.getElementById("classroom-tab-content");
      const user = Session.getCurrentUser();
      const prog = window.DB.get("progress").find(p => p.userId === user.id && p.courseId === activeCourseId);

      const notesHtml = !prog || prog.notes.filter(n => n.lessonId === activeLesson.id).length === 0 
        ? "<p style='color:var(--text-muted); font-size:0.9rem;'>No notes recorded for this lecture. Write your key takeaways below.</p>"
        : prog.notes.filter(n => n.lessonId === activeLesson.id).map(note => `
            <div style="padding:0.75rem; background:rgba(255,255,255,0.02); border:1px solid var(--border-color); border-radius:4px; margin-bottom:0.75rem;">
              <div style="font-size:0.75rem; color:var(--color-secondary);">${new Date(note.date).toLocaleString()}</div>
              <p style="font-size:0.9rem; margin-top:0.25rem;">${note.text}</p>
            </div>
          `).join('');

      const bookmarksHtml = !prog || prog.bookmarks.filter(b => b.lessonId === activeLesson.id).length === 0
        ? "<p style='color:var(--text-muted); font-size:0.9rem;'>No bookmarks saved. Click 'Bookmark Timestamp' on the player.</p>"
        : prog.bookmarks.filter(b => b.lessonId === activeLesson.id).map(b => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:0.5rem; background:rgba(255,255,255,0.02); border:1px solid var(--border-color); border-radius:4px; margin-bottom:0.5rem; font-size:0.85rem;">
              <span>📌 ${b.noteText}</span>
              <button class="btn btn-secondary btn-xs" onclick="seekVideo(${b.timestamp})">Seek: ${Math.floor(b.timestamp / 60)}:${(b.timestamp % 60).toString().padStart(2, '0')}</button>
            </div>
          `).join('');

      content.innerHTML = `
        <div class="grid-2" style="gap:1.5rem; align-items:flex-start;">
          <div>
            <h4>Personal Lecture Notes</h4>
            <div style="margin:1rem 0; max-height:220px; overflow-y:auto;">
              ${notesHtml}
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <textarea id="note-input" class="form-input" placeholder="Type notes here..." rows="2"></textarea>
              <button class="btn btn-primary btn-xs" style="margin-top:0.5rem; align-self:flex-end;" onclick="savePersonalNote()">Save Note</button>
            </div>
          </div>

          <div>
            <h4>Timestamp Bookmarks</h4>
            <div style="margin-top:1rem; max-height:280px; overflow-y:auto;">
              ${bookmarksHtml}
            </div>
          </div>
        </div>
      `;
    }

    function seekVideo(sec) {
      const video = document.getElementById("classroom-video");
      if (video) {
        video.currentTime = sec;
        video.play();
        showToast("Seeking video to bookmark.", "info");
      }
    }

    function savePersonalNote() {
      const text = document.getElementById("note-input").value.trim();
      if (!text) return;

      const user = Session.getCurrentUser();
      const progressList = window.DB.get("progress");
      const prog = progressList.find(p => p.userId === user.id && p.courseId === activeCourseId);

      if (prog) {
        prog.notes.push({
          lessonId: activeLesson.id,
          text,
          date: new Date().toISOString()
        });
        window.DB.update("progress", prog.id, { notes: prog.notes });
        showToast("Note saved successfully!", "success");
        renderNotesTab();
      }
    }

    // Classroom Forum Simulation
    function renderForumTab(content) {
      const reviews = window.DB.get("reviews").filter(r => r.courseId === activeCourseId);
      
      const forumHtml = reviews.map(post => `
        <div class="thread-post">
          <div class="thread-post-author">👤 ${post.userName}</div>
          <div class="thread-post-text">${post.comment}</div>
        </div>
      `).join('');

      content.innerHTML = `
        <h4>Class Q&A Forum</h4>
        <div style="max-height:250px; overflow-y:auto; margin: 1rem 0;">
          ${forumHtml}
        </div>
        <div style="display:flex; gap:0.5rem;">
          <input type="text" id="forum-input" class="form-input" style="flex-grow:1" placeholder="Ask a question or post a comment...">
          <button class="btn btn-primary" onclick="postForumComment()">Post</button>
        </div>
      `;
    }

    function postForumComment() {
      const text = document.getElementById("forum-input")?.value.trim();
      if (!text) return;

      const user = Session.getCurrentUser();
      const review = {
        id: "rev_" + Date.now(),
        courseId: activeCourseId,
        userId: user.id,
        userName: user.name,
        rating: 5,
        comment: text,
        date: new Date().toISOString()
      };
      window.DB.insert("reviews", review);
      showToast("Message posted to discussion board!", "success");
      renderForumTab(document.getElementById("classroom-tab-content"));
    }

    function renderAnnouncementsTab(content) {
      const ann = window.DB.get("announcements").filter(a => a.courseId === activeCourseId);

      const annHtml = ann.length === 0 
        ? "<p style='color:var(--text-muted); font-size:0.9rem;'>No announcements published by the instructor.</p>"
        : ann.map(a => `
            <div style="padding:1rem; border:1px solid var(--border-color); background:rgba(255,255,255,0.02); border-radius:4px; margin-bottom:1rem;">
              <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--color-secondary);">
                <span>Broadcast Notice</span>
                <span>${new Date(a.date).toLocaleDateString()}</span>
              </div>
              <h4 style="margin: 0.25rem 0;">${a.title}</h4>
              <p style="font-size:0.9rem; color:var(--text-muted);">${a.content}</p>
            </div>
          `).join('');

      content.innerHTML = `
        <h4>Instructor Bulletins</h4>
        <div style="margin-top: 1rem; max-height: 300px; overflow-y: auto;">
          ${annHtml}
        </div>
      `;
    }
  </script>
</body>
</html>
