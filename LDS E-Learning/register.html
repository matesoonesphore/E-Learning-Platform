<!DOCTYPE html>
<html lang="en" data-theme="dark" data-contrast="normal">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Register an account on LDS E-Learning Platform. Choose your learning goals and begin coding pathways today.">
  <title>LDS E-Learning Platform | Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="app-container">
    <header class="global-header"></header>

    <main class="auth-container">
      <div class="card auth-card">
        <div class="auth-header">
          <h2>Create Account</h2>
          <p style="color: var(--text-muted); font-size: 0.9rem;">Join thousands of students building technology skills.
          </p>
        </div>

        <form id="register-form" onsubmit="handleRegisterSubmit(event)">
          <div class="form-group">
            <label for="name-input">Full Name</label>
            <input type="text" id="name-input" class="form-input" placeholder="e.g. Alex Mercer" required>
          </div>
          <div class="form-group">
            <label for="email-input">Email Address</label>
            <input type="email" id="email-input" class="form-input" placeholder="e.g. alex@example.com" required>
          </div>
          <div class="form-group">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" class="form-input" placeholder="•••••••• (At least 6 characters)"
              minlength="6" required>
          </div>
          <div class="form-group">
            <label for="role-select">Select Platform Role</label>
            <select id="role-select" class="form-input">
              <option value="student">Student / Learner</option>
              <option value="instructor">Instructor / Content Creator</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
          <span style="color: var(--text-muted);">Already have an account? </span>
          <a href="login.html" style="color: var(--color-primary); font-weight: 600;">Sign In</a>
        </div>
      </div>
    </main>

    <footer class="global-footer"></footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (Session.getCurrentUser()) {
        window.location.href = "dashboard.html";
      }
    });

    function handleRegisterSubmit(e) {
      e.preventDefault();
      const name = document.getElementById("name-input").value;
      const email = document.getElementById("email-input").value;
      const pass = document.getElementById("password-input").value;
      const role = document.getElementById("role-select").value;

      Auth.register(name, email, pass, role);
    }
  </script>
</body>

</html>
