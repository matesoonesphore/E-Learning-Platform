<!DOCTYPE html>
<html lang="en" data-theme="dark" data-contrast="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse available courses on LDS E-Learning Platform. Search by category, level, price, and language, and start learning immediately.">
  <title>LDS E-Learning Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .marketplace-header {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--bg-surface);
      padding: 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      align-items: center;
    }
    .filter-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 140px;
      flex-grow: 1;
    }
    .filter-item label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .search-wrapper {
      flex-grow: 3;
      min-width: 250px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="global-header"></header>

    <main class="container">
      
      <div class="marketplace-header">
        <div>
          <h2>Explore Dynamic Courses</h2>
          <p style="color: var(--text-muted);">Find high-definition courses on bleeding-edge tech topics.</p>
        </div>

        <!-- Filters Block -->
        <div class="filters-bar">
          <div class="filter-item search-wrapper">
            <label for="search-input">Search Keywords</label>
            <input type="text" id="search-input" class="form-input" placeholder="e.g. HTML5, Grid, JavaScript" oninput="Courses.filterCourses()">
          </div>

          <div class="filter-item">
            <label for="filter-category">Category</label>
            <select id="filter-category" class="form-input" onchange="Courses.filterCourses()">
              <!-- Populated dynamically -->
            </select>
          </div>

          <div class="filter-item">
            <label for="filter-level">Skill Level</label>
            <select id="filter-level" class="form-input" onchange="Courses.filterCourses()">
              <option value="All">All Levels</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>

          <div class="filter-item">
            <label for="filter-language">Language</label>
            <select id="filter-language" class="form-input" onchange="Courses.filterCourses()">
              <option value="All">All Languages</option>
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="rw">Kinyarwanda</option>
            </select>
          </div>

          <div class="filter-item">
            <label for="filter-price">Pricing</label>
            <select id="filter-price" class="form-input" onchange="Courses.filterCourses()">
              <option value="All">All Prices</option>
              <option value="free">Free</option>
              <option value="paid">Paid</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Course Cards Grid -->
      <section class="grid-3" id="courses-grid" style="margin-bottom: 4rem;">
        <!-- Dynamically rendered -->
      </section>

      <!-- Pathways Container -->
      <section class="paths-section" style="margin-bottom: 4rem;">
        <div style="text-align: center; margin-bottom: 1.5rem;">
          <h2>🛣️ Recommended Pathways</h2>
          <p style="color: var(--text-muted);">Enroll in logical pathways to earn specialization milestones.</p>
        </div>
        <div id="paths-container">
          <!-- Dynamically populated -->
        </div>
      </section>

    </main>

    <footer class="global-footer"></footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      Courses.initMarketplace();
    });
  </script>
</body>
</html>
